services:
  # ==========================================
  # DATA SYNC SERVICE
  # ==========================================
  data-sync:
    image: alpine:latest
    volumes:
      # Mount host directory (Read-Write so we can burn the flag)
      - D:\!staging\@Mestrado\PCBA-AOI\output_sliced:/src
      # Mount the Docker volume for the destination
      - rfdetr_dataset:/dest
    command: >
      sh -c "
      if [ -f /src/.new_data_flag ]; then
        echo 'Flag found. Wiping and syncing data...';
        rm -rf /dest/* /dest/.[!.]* /dest/..?* 2>/dev/null || true;
        cp -a /src/. /dest/;
        rm -f /src/.new_data_flag;
        rm -f /dest/.new_data_flag;
        echo 'Sync complete. Flag burned.';
      else
        echo 'No flag found. Skipping sync.';
        exit 0;
      fi
      "

  # ==========================================
  # RF-DETR TRAINING SERVICE
  # ==========================================
  rfdetr:
    depends_on:
      data-sync:
        condition: service_completed_successfully
    build: .
    container_name: rfdetr_trainer
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # The training container just mounts the populated volume
      - rfdetr_dataset:/workspace/data:ro
      - ./output:/workspace/output
      - ./roboflow_cache:/root/.roboflow  # <--- ADD THIS LINE
      - ./config.yaml:/workspace/code/config.yaml:ro
      - ./rfdetr_train.py:/workspace/code/rfdetr_train.py:ro
    working_dir: /workspace/code
    
    command: python rfdetr_train.py
    stdin_open: true 
    tty: true       
    
    environment:
      - CUDA_VISIBLE_DEVICES=0,1
      - NCCL_DEBUG=INFO
      - NCCL_P2P_DISABLE=1
      - NCCL_IB_DISABLE=1
      - NCCL_SOCKET_IFNAME=eth0
      - OMP_NUM_THREADS=1
      - PYTHONFAULTHANDLER=1
    shm_size: '16gb' 

volumes:
  rfdetr_dataset:
    name: rfdetr_dataset